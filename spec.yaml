      agg_function: "sum"
      time_frequency: ${{ workflow.time_frequency.return }}
      ncols: 2 
      shared_yaxes: false
      group_order: null
      row_height: 350
      ascending: true
      bar_color: "#6495ed"
      x_axis_style:
        title: "Date"
      y_axis_style:
        title: "Total animals killed"
      tick_font_size: null 
      plot_style: null 
      layout_style: null 
      
  - name: Persist multi-bar time series chart of animals killed by predator species
    id: persist_predator_killed_multibar
    task: persist_text
    skipif:
      conditions:
