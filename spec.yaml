  # Template generation 
  - name: Download template for Big Life PCF Dashboard Report
    id: download_big_life_template
    task: fetch_and_persist_file
    partial: 
      url: https://www.dropbox.com/scl/fi/i1v1emk1s2sb15w2arhld/pcf_report_template.docx?rlkey=16850ymbagt9vbuyqn8fsg7tc&st=zuxci7sv&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false
  
  - name: Get user name to use on template 
    id: get_user_name 
    task: get_current_user
    partial: 
      client: ${{ workflow.er_client_name.return }}
  
  - name: Get user full name 
    id: get_fullname 
    task: get_user_full_name 
    partial: 
      user: ${{ workflow.get_user_name.return }}

  - name: Add outputs generated to template and persist 
    id: generate_big_life_report
    task: generate_pcf_report 
    partial: 
      template_path: ${{ workflow.download_big_life_template.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: "big_life_pcf_report.docx"
      time_period: ${{ workflow.time_range.return }}
      generated_by: ${{ workflow.get_fullname.return }}
      validate_images: true 

  - name: Generate Big Life PCF Dashboard Report
    id: big_life_pcf_dashboard_report
    task: gather_dashboard
    partial: 
      details: ${{ workflow.workflow_details.return }}
      widgets: []
      time_range: ${{ workflow.time_range.return }}
      groupers: ${{ workflow.groupers.return }}
