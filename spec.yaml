  - name: Group current ranch level groupers and previous ranch level groupers 
    id: group_ranch_level_groupers 
    task: zip_groupbykey
    partial: 
      sequences:
        - ${{ workflow.split_by_ranch.return }} # current dataframe
        - ${{ workflow.split_previous_by_ranch.return }} # previous dataframe
      
  - name: Draw historic time series chart
    id: draw_ranch_level_historic_chart
    task: draw_historic_time_series_chart
    partial:
      x_axis: "time"
      y_axis: "Total animals killed"
      agg_function: "sum"
      time_frequency: ${{ workflow.time_frequency.return }}
      ncols: 2
      shared_yaxes: false
