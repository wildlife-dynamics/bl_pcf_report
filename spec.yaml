id: bl_pcf_report
requirements:
  - name: ecoscope-workflows-core
    version: "0.22.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-ecoscope
    version: "0.22.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-custom
    version: "0.0.39.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-ste
    version: "0.0.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mnc
    version: "0.0.7.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mep
    version: "0.12.0.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-big-life
    version: "0.0.11.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

rjsf-overrides:
  properties:
    Previous period time range.title: "Previous Period Range"
    Previous period time range.properties.previous_period_range.properties.periods_back.title: "Periods Back"
    Previous period time range.properties.previous_period_range.properties.periods_back.description: >-
      How many periods back to shift (default: 1 = the immediately preceding
      period). Increase to compare against a more distant reference window.
    Previous period time range.properties.previous_period_range.properties.periods_back.default: 1

workflow:
  # Set workflow details 
  - name: Set Workflow Details
    id: workflow_details
    task: set_workflow_details
  
  # Define time range 
  - name: Set Report Time Range
    id: time_range
    task: set_time_range

  # Define groupers 
  - name: Set Data Grouping
    id: groupers
    task: set_groupers
    partial:
      groupers:
        - index_name: "Ranch"

  #  Connect to ER 
  - name: Connect to EarthRanger
    id: er_client_name 
    task: set_er_connection

  # Set basemaps connection 
  - name: Configure base map layers
    id: configure_base_maps
    task: set_base_maps_pydeck
    partial:
      base_maps:
        - url: >-
            https://server.arcgisonline.com/arcgis/rest/services/Elevation/World_Hillshade/MapServer/tile/{z}/{y}/{x}
          opacity: 1
          max_zoom: 20
        - url: >-
            https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}
          opacity: 0.15
          max_zoom: 20

  - name: Download amboseli conservancy layers
    id: ambo_ranch_layers
    task: fetch_and_persist_file
    partial:
      url: https://www.dropbox.com/scl/fi/wrcp3pnnxqyrclzmbtt1r/amboseli_ranch_conservancies_layers.gpkg?rlkey=jfbqj1b1nwhijxbsy7b2v1d29&st=d7rbqdfe&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3 
      unzip: false 
  
  - name: Download amboseli ranch boundaries and electric fence
    id: ambo_bound_fence 
    task: fetch_and_persist_file
    partial: 
      url: https://www.dropbox.com/scl/fi/k6dgrmxmxeb3fe6glihwa/amboseli_group_ranch_boundaries_x_electric_fence.gpkg?rlkey=limtzffe88lr0iof5kf3b6uoy&st=rreho3tq&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false
  
  - name: Download Amboseli Conservancies
    id: ambo_conservancies 
    task: fetch_and_persist_file
    partial: 
      url: https://www.dropbox.com/scl/fi/blo1smf49buhwx24y4z60/amboseli_group_ranch_boundaries.gpkg?rlkey=w86emavj8ug7zab73ifbzg6jv&st=v8uptlb0&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  - name: Select time frequency for temporal charts 
    id: time_frequency
    task: select_time_frequency

  - name: Load amboseli conservancy layers 
    id: load_ambo_layers 
    task: load_df 
    partial:  
      file_path: ${{ workflow.ambo_ranch_layers.return }}
      layer: null 
      deserialize_json: false 

  - name: Load amboseli ranch boundaries and electric fence 
    id: load_ambo_boundaries_fence 
    task: load_df 
    partial: 
      file_path: ${{ workflow.ambo_bound_fence.return }}
      layer: null 
      deserialize_json: false 
  
  - name: Load amboseli conservancies 
    id: load_ambo_conservancies 
    task: load_df 
    partial: 
      file_path: ${{ workflow.ambo_conservancies.return }}
      layer: null 
      deserialize_json: false 

  - name: Reproject Amboseli Conservancy Layers to WGS84
    id: reproject_ambo_layers 
    task: reproject_gdf
    partial: 
      gdf: ${{ workflow.load_ambo_layers.return }}
      target_crs: "EPSG:4326"

  - name: Reproject Amboseli Ranch Boundaries and Electric Fence to WGS84
    id: reproject_ambo_boundaries 
    task: reproject_gdf
    partial: 
      gdf: ${{ workflow.load_ambo_boundaries_fence.return }}
      target_crs: "EPSG:4326"

  - name: Reproject Amboseli Conservancies to WGS84
    id: reproject_ambo_conservancies
    task: reproject_gdf
    partial: 
      gdf: ${{ workflow.load_ambo_conservancies.return }}
      target_crs: "EPSG:4326"

  - name: Split Amboseli Layers by Land Use
    id: split_ambo_layers_use 
    task: split_gdf_by_column
    partial: 
      gdf: ${{ workflow.reproject_ambo_layers.return }}
      column: land_use

  - name: Annotate Amboseli Layers with Geometry Type
    id: annotate_ambo_layers_gdf_dict 
    task: annotate_gdf_dict_with_geom_type
    partial:  
      gdf_dict: ${{ workflow.split_ambo_layers_use.return }}

  - name: Create styled layers from split amboseli layers 
    id: create_ambo_layers_styled 
    task: create_deckgl_layers_from_gdf_dict
    partial: 
      gdf_dict: ${{ workflow.annotate_ambo_layers_gdf_dict.return }}
      styles: 
        Rangeland:
          extruded: false
          get_fill_color: [163, 156, 145]
          get_line_color: [163, 156, 145]
          get_line_width: 0.85
          stroked: true 
          filled: true 
          opacity: 0.75

        Rangeland and settlement:
          extruded: false
          get_fill_color: [255, 160, 122]
          get_line_color: [255, 160, 122]
          get_line_width: 0.85
          stroked: true 
          filled: true 
          opacity: 0.75

        Settlement and agriculture:
          extruded: false
          get_fill_color: [47, 79, 79]
          get_line_color: [47, 79, 79]
          get_line_width: 0.85
          stroked: true 
          filled: true 
          opacity: 0.75

        Conservancies:
          extruded: false
          get_fill_color: [143, 188, 139]
          get_line_color: [143, 188, 139]
          get_line_width: 0.85
          stroked: true 
          filled: true 
          opacity: 0.75

        National parks and reserves:
          extruded: false
          get_fill_color: [77, 102, 0]
          get_line_color: [77, 102, 0]
          get_line_width: 0.85
          stroked: true 
          filled: true 
          opacity: 0.75

      legends: 
        title: Map Layers 
        values: 
          - label: Conservancies 
            color: "#8fbc8b"

          - label: National park and reserves
            color: "#4d6600"

          - label: Settlement and agriculture 
            color: "#2f4f4f"

          - label: Rangeland 
            color: "#a39c91"

          - label: Rangeland and settlement 
            color: "#ffa07a"

  - name: Split Amboseli Electric Fence and Boundaries by Land Use
    id: split_ambo_boundaries
    task: split_gdf_by_column
    partial:  
      gdf: ${{ workflow.reproject_ambo_boundaries.return }}
      column: land_use 

  - name: Annotate Amboseli Boundaries and Electric Fence with Geometry Type
    id: annotate_ambo_boundaries 
    task: annotate_gdf_dict_with_geom_type
    partial: 
      gdf_dict: ${{ workflow.split_ambo_boundaries.return }}

  - name: Create styled layers from split amboseli boundaries and electric fence 
    id: create_ambo_boundaries_styled 
    task: create_deckgl_layers_from_gdf_dict
    partial:
      gdf_dict: ${{ workflow.annotate_ambo_boundaries.return }}
      styles: 
        Ranch boundaries: 
          extruded: false 
          get_color: [0, 0, 0]
          get_line_width: 0.95
          get_width: 0.95
          stroked: true 
          filled: false
          opacity: 0.55

        Electric Fence:
          extruded: false 
          get_color: [45, 98, 177]
          get_width: 5.5 
          stroked: true 
          filled: false 
          opacity: 1.0

      legends: 
        title: ""
        values: 
          - label: Electric fence
            color: "#2d62b1"

          - label: Ranch boundaries
            color: "#000000"

  - name: Retrieve current events 
    id: get_current_events
    task: get_events
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at
        - event_details

      event_types:
        - hwc_lvstprd
      raise_on_empty: true
      include_details: true
      include_updates: false
      include_related_events: false
      include_null_geometry: false
      include_display_values: true
  
  - title: Previous period time range
    type: task-group
    description: >-
      Automatically calculated from the report time range above — shifted back
      by one equivalent period. For example, if the report covers Jan 1–Feb 1,
      the previous period will be Dec 1–Jan 1. This is used to compare current
      events against the same duration in the prior period.
    tasks:
      - name: null
        id: previous_period_range
        task: shift_previous_period
        partial: 
          time_range: ${{ workflow.time_range.return }}


  - name: Retrieve previous period events
    id: get_previous_data
    task: get_events
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.previous_period_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at
        - event_details

      event_types:
        - hwc_lvstprd
      raise_on_empty: false
      include_details: true
      include_updates: false
      include_related_events: false
      include_null_geometry: false
      include_display_values: true

  - name: Process current events details
    id: process_current_details
    task: process_events_details 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.get_current_events.return }}
      client: ${{ workflow.er_client_name.return }}
      map_to_titles: true 
      ordered: true

  - name: Normalize Current Events Column Names
    id: normalize_current_events 
    task: normalize_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      column: event_details
      df: ${{ workflow.process_current_details.return }}
      skip_if_not_exists: true 
      sort_columns: true 

  - name: Drop column prefix from current events 
    id: drop_current_prefix 
    task: drop_column_prefix
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.normalize_current_events.return }}
      prefix: event_details__
      duplicate_strategy: keep_original 

  - name: Rename and Filter Current Event Columns
    id: map_current_columns 
    task: map_columns
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.drop_current_prefix.return }}
      drop_columns: [
            "event_category",
            "event_type",
            "reported_by",
            "event_type_display",
            "Boma coordinate X",
            "Boma coordinate Y",
            "GPS Accuracy",
            "Owner ID number",
            "Owner name",
        ]
      retain_columns: []
      rename_columns: {}
      raise_if_not_found: true

  - name: Filter Events to Target Ranches
    id: retain_current_ranches
    task: filter_row_values 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.map_current_columns.return }}
      column: Ranch 
      values: 
        - Eselengei 
        - Mbirikani 
        - Kimana 
  
  - name: Filter Current Events to Valid Claims Only
    id: filter_current_valid_claims
    task: filter_row_values
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.retain_current_ranches.return }}
      column: "Validity of claim"
      values: 
        - Valid

  - name: Replace Missing Values in Current Events with N/A
    id: replace_current_missing_na
    task: replace_missing_with_label 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.filter_current_valid_claims.return }}
      columns: [
            "Did anyone see the predator",
            "Did the predator enter boma",
            "Did the predator scare livestock from inside boma",
            "Does boma have LED simba lights",
            "Does boma have predator proof fencing",
            "Predator Scout present",
            "Tracks present",
        ]
      label: "N/A"
      
  - name: Replace Unknown Values in Current Events
    id: replace_current_missing_unknown
    task: replace_missing_with_label 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.replace_current_missing_na.return }}
      columns: [
            "Boma type",
            "Livestock species",
            "Predator Scout present",
            "Ranch",
            "Time of attack",
            "Type of claim",
            "Validity of claim",
            "Where were the livestock when the attack happened",
            "Animal responsible",
        ]
      label: "Unknown"

  - name: Convert Current Event Numeric Columns to Integer
    id: convert_current_to_int 
    task: convert_column_values_to_numeric #convert_to_int 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.replace_current_missing_unknown.return }}
      columns: [
            "Adults injured",
            "Adults killed",
            "Compensation value to owner",
            "Young (<1yr) injured",
            "Young (<1yr) killed",
        ]

  - name: Process previous events details
    id: process_previous_details
    task: process_events_details
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.get_previous_data.return }}
      client: ${{ workflow.er_client_name.return }}
      map_to_titles: true
      ordered: true

  - name: Normalize previous events column
    id: normalize_previous_events
    task: normalize_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      column: event_details
      df: ${{ workflow.process_previous_details.return }}
      skip_if_not_exists: true
      sort_columns: true
  
  - name: Drop column prefix from previous events
    id: drop_previous_prefix
    task: drop_column_prefix
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.normalize_previous_events.return }}
      prefix: event_details__
      duplicate_strategy: keep_original

  - name: Rename and Filter Previous Event Columns
    id: map_previous_columns
    task: map_columns
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.drop_previous_prefix.return }}
      drop_columns: [
            "event_category",
            "event_type",
            "reported_by",
            "event_type_display",
            "Boma coordinate X",
            "Boma coordinate Y",
            "GPS Accuracy",
            "Owner ID number",
            "Owner name",
        ]
      retain_columns: []
      rename_columns: {}
      raise_if_not_found: true

  - name: Filter Previous Events to Target Ranches
    id: retain_previous_ranches
    task: filter_row_values
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.map_previous_columns.return }}
      column: Ranch
      values:
        - Eselengei
        - Mbirikani
        - Kimana    

  - name: Filter Previous Events to Valid Claims Only
    id: filter_previous_valid_claims
    task: filter_row_values
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.retain_previous_ranches.return }}
      column: "Validity of claim"
      values:
        - Valid

  - name: Replace Missing Values in Previous Events with N/A
    id: replace_previous_missing_na
    task: replace_missing_with_label
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.filter_previous_valid_claims.return }}
      columns: [
            "Did anyone see the predator",
            "Did the predator enter boma",
            "Did the predator scare livestock from inside boma",
            "Does boma have LED simba lights",
            "Does boma have predator proof fencing",
            "Predator Scout present",
            "Tracks present",
        ]
      label: "N/A"

  - name: Replace Unknown Values in Previous Events
    id: replace_previous_missing_unknown
    task: replace_missing_with_label
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.replace_previous_missing_na.return }}
      columns: [
            "Boma type",
            "Livestock species",
            "Predator Scout present",
            "Ranch",
            "Time of attack",
            "Type of claim",
            "Validity of claim",
            "Where were the livestock when the attack happened",
            "Animal responsible",
        ]
      label: "Unknown"  
  
  - name: Convert Previous Event Numeric Columns to Integer
    id: convert_previous_to_int
    task: convert_column_values_to_numeric #convert_to_int
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.replace_previous_missing_unknown.return }}
      columns: [
            "Adults injured",
            "Adults killed",
            "Compensation value to owner",
            "Young (<1yr) injured",
            "Young (<1yr) killed",
        ]

  - name: Combine current columns to create total livestock killed 
    id: current_total_killed
    task: combine_columns
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.convert_current_to_int.return }}
      output_column: "Total animals killed"
      input_columns: [
            "Adults killed",
            "Young (<1yr) killed",
        ]
      agg_func: "sum"
  
  - name: Combine previous columns to create total livestock killed
    id: previous_total_killed
    task: combine_columns
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.convert_previous_to_int.return }}
      output_column: "Total animals killed"
      input_columns: [
            "Adults killed",
            "Young (<1yr) killed",
        ]
      agg_func: "sum"

  - name: Overall Predation Incidents Summary
    id: overall_predation_incidents
    task: crosstab_summary
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      data: ${{ workflow.current_total_killed.return }}
      index_col: "Animal responsible"
      column_col: "Livestock species"
      aggfunc: "sum"
      reset_index: false 
      margins: true
      value_col: null 
      margins_name: "Total"

  - name: Overall Livestock Killed Summary
    id: overall_predation_killed 
    task: crosstab_summary
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      data: ${{ workflow.current_total_killed.return }}
      index_col: "Animal responsible"
      column_col: "Livestock species"
      value_col: "Total animals killed"
      aggfunc: "sum"
      reset_index: false
      margins: true
      margins_name: "Total"
      

  - name: Overall Compensation Value Summary
    id: overall_compensation_summary 
    task: crosstab_summary
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      data: ${{ workflow.convert_current_to_int.return }}
      index_col: "Animal responsible"
      column_col: "Livestock species"
      value_col: "Compensation value to owner"
      aggfunc: "sum"
      reset_index: false
      margins: true
      margins_name: "Total"

  - name: Compile Overall Predation Summary Table
    id: overall_summary_table 
    task: summarize_predation_table 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      incidents: ${{ workflow.overall_predation_incidents.return }}
      kills: ${{ workflow.overall_predation_killed.return }}
      compensation: ${{ workflow.overall_compensation_summary.return }}

  - name: Convert Overall Summary to Integer
    id: convert_overall_summary_int 
    task: convert_numeric_to_int 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.overall_summary_table.return }}

  - name: Format Overall Summary Numbers
    id: format_overall_summary 
    task: format_numeric_with_commas 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.convert_overall_summary_int.return }}

  - name: Save Overall Predation Summary Table
    id: persist_overall_table 
    task: persist_df 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.format_overall_summary.return }}
      filename: "overall_predation_summary"
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: "geoparquet"

  # Ranch groupers
  - name: Split Predation Events by Ranch
    id: split_by_ranch 
    task: split_groups
    partial: 
      df: ${{ workflow.current_total_killed.return }}
      groupers: ${{ workflow.groupers.return }}

  - name: Split Previous Predation Events by Ranch
    id: split_previous_by_ranch
    task: split_groups
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.previous_total_killed.return }}
      groupers: ${{ workflow.groupers.return }}

  - name: Predation Incidents Summary by Ranch
    id: predation_ranch_incidents
    task: crosstab_summary
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      index_col: "Animal responsible"
      column_col: "Livestock species"
      aggfunc: "sum"
      reset_index: false
      margins: true 
      value_col: null
      margins_name: "Total"
    mapvalues:
      argnames: data 
      argvalues: ${{ workflow.split_by_ranch.return }}

  - name: Livestock Killed Summary by Ranch
    id: predation_ranch_killed
    task: crosstab_summary
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      index_col: "Animal responsible"
      column_col: "Livestock species"
      value_col: "Total animals killed"
      aggfunc: "sum"
      reset_index: false
      margins: true 
      margins_name: "Total"
    mapvalues:
      argnames: data
      argvalues: ${{ workflow.split_by_ranch.return }}

  - name: Compensation Value Summary by Ranch
    id: predation_ranch_compensation
    task: crosstab_summary
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      index_col: "Animal responsible"
      column_col: "Livestock species"
      value_col: "Compensation value to owner"
      aggfunc: "sum"
      reset_index: false
      margins: true
      margins_name: "Total"

    mapvalues:
      argnames: data
