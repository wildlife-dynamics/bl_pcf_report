          tickangle: 45 
          showgrid: true 
          gridcolor: "#e5e5e5"
        yaxis:
          title: "Number of claims"
          showgrid: true
          gridcolor: "#e5e5e5"

  - name: Persist multi-line chart of incidents by type of claim
    id: persist_claim_type_multiline
