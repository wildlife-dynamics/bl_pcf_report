    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      text: ${{ workflow.claim_type_multiline_chart.return }}
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
